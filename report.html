<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLO प्रगती अहवाल - SIR वाशिम</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- SheetJS (Excel वाचण्यासाठी) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        body { background-color: #f4f7f6; font-family: 'Arial Unicode MS', Mangal, Arial, sans-serif; }
        
        .table-wrapper { overflow-x: auto; background: white; padding: 10px; }
        
        table { width: 100%; table-layout: auto; font-size: 11px; border-collapse: collapse; margin-bottom: 20px; }
        
        th, td { 
            padding: 5px !important; 
            text-align: center; 
            vertical-align: middle; 
            white-space: normal; 
            word-wrap: break-word; 
            border: 1px solid #555; 
        }
        
        th { background-color: #003366 !important; color: white !important; }
        
        .subtotal-row { background-color: #e9ecef !important; font-weight: bold; }
        .grandtotal-row { background-color: #ffc107 !important; color: black !important; font-weight: bold; font-size: 12px; border-top: 2px solid #000; }
        
        #pdfContent { display: none; padding: 10px; }
        
        .print-header { text-align: center; margin-bottom: 10px; color: #003366; }
        .print-header h3 { margin: 0; padding: 0; font-weight: bold; font-size: 18px; }
        .print-header p { margin: 5px 0 0 0; font-size: 12px; font-weight: bold; color: #333; }
        
        /* =========================================
           PRINT & PDF CSS (फक्त PDF बनवताना लागू होईल)
           ========================================= */
        @media print {
            /* PDF मध्ये मेनू आणि अपलोड बटण लपवणे */
            nav, .upload-section, #downloadPdfBtn, h4.text-primary { display: none !important; }
            
            /* पांढरा रंग आणि मार्जिन सेट करणे */
            body { background-color: white !important; margin: 0; padding: 0; }
            .table-wrapper { border: none !important; box-shadow: none !important; padding: 0; }
            
            /* A4 Landscape सेटिंग */
            @page { size: A4 landscape; margin: 10mm; }
            
            /* रंगीत बॅकग्राउंड PDF मध्ये येण्यासाठी */
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            
            /* प्रत्येक पानावर टेबल हेडर रिपीट होण्यासाठी */
            thead { display: table-header-group; }
            tr { page-break-inside: avoid; }
            
            /* पेज ब्रेक: प्रत्येक सुपरवायझर नवीन पानावर जाण्यासाठी */
            .page-break { page-break-before: always; clear: both; }
        }
    </style>
</head>
<body>

<!-- नेव्हिगेशन मेनू -->
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm" style="background-color: #003366;">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="index.html">SIR वाशिम</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">🏠 मुख्य डॅशबोर्ड</a></li>
        <li class="nav-item"><a class="nav-link active fw-bold" href="#">📊 प्रगती अहवाल (PDF)</a></li>
        <li class="nav-item"><a class="nav-link text-warning fw-bold" href="entry.html">📝 BLO डेटा एंट्री</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container-fluid mt-4">
    <h4 class="text-center text-primary fw-bold mb-4">BLO प्रगती अहवाल जनरेटर</h4>
    
    <!-- फाईल अपलोड सेक्शन -->
    <div class="row justify-content-center mb-4 upload-section">
        <div class="col-md-6">
            <div class="card p-4 shadow-sm border-primary text-center">
                <label class="form-label fw-bold">ECI ची Excel फाईल अपलोड करा:</label>
                <input type="file" id="excelUpload" class="form-control mb-3" accept=".xlsx, .xls, .csv">
                
                <div id="loadingMsg" class="text-warning fw-bold mt-2" style="display:none;">⏳ डेटा मॅच आणि कॅल्क्युलेट करत आहे...</div>
                
                <button id="downloadPdfBtn" class="btn btn-danger fw-bold w-100" style="display:none;" onclick="downloadPDF()">
                    📄 PDF डाऊनलोड करा (Save as PDF)
                </button>
            </div>
        </div>
    </div>

    <!-- रिपोर्ट दाखवण्यासाठी मुख्य कंटेनर -->
    <div class="mt-4 shadow-sm table-wrapper border" id="pdfContent"></div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyp8OWRFBts_lfMSK4VdK0k6OSn7eyBTu0tu9XEjCpgIWevzvuE24mv54VJKm2tk2B7cQ/exec';
    let bloMapping = {}; 
    let reportDateStr = "";

    document.addEventListener("DOMContentLoaded", function() {
        fetch(scriptURL)
            .then(response => response.json())
            .then(data => buildMapping(data))
            .catch(error => alert('Hierarchy डेटा लोड करताना त्रुटी आली!'));
            
        reportDateStr = "अहवाल दिनांक व वेळ: " + new Date().toLocaleString('en-IN');
    });

    function buildMapping(contacts) {
        contacts.filter(c => c.Role === "BLO").forEach(blo => {
            let supervisor = contacts.find(c => c.ID === blo.Reports_To_ID);
            let partNo = String(blo.Ward_Area).trim();
            bloMapping[partNo] = { bloName: blo.Name, supName: supervisor ? supervisor.Name : "N/A" };
        });
    }

    document.getElementById('excelUpload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        document.getElementById('loadingMsg').style.display = 'block';
        document.getElementById('downloadPdfBtn').style.display = 'none';
        
        const reader = new FileReader();
        reader.onload = function(event) {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const firstSheetName = workbook.SheetNames[0];
            const excelJson = XLSX.utils.sheet_to_json(workbook.Sheets[firstSheetName]);
            generateReport(excelJson);
        };
        reader.readAsArrayBuffer(file);
    });

    function generateReport(excelData) {
        const pdfContainer = document.getElementById('pdfContent');
        pdfContainer.innerHTML = ""; 

        const headers = [
            "Sr. No", "Name of Supervisor", "Name of BLO", "Part Number", 
            "Total Elector", "Total EFs Distributed", "Total EFs Digitized", 
            "EFs Submitted (Not verified)", "EFs Verified by BLO", "Mapped as Progeny", 
            "Mapped as Self", "No Mapping", "UEF Death", "UEF Permanent Shifting", 
            "UEF Already Enrolled", "UEF Absent", "UEF Others", "Total UEF"
        ];

        const numericKeys = [
            "Total Elector", "Total EFs Distributed", "Total EFs Digitized", 
            "EFs Submitted by Elector ( Not verified by BLO)", "EFs Verified by BLO", 
            "Mapped as Progeny", "Mapped as Self", "No Mapping", "UEF Death", 
            "UEF Permanent Shifting", "UEF Already Enrolled", "UEF Absent", "UEF Others", "Total UEF"
        ];

        let matchedRows = [];
        excelData.forEach(row => {
            let partNo = String(row["Part Number"]).trim();
            if (bloMapping[partNo]) {
                matchedRows.push({
                    supName: bloMapping[partNo].supName,
                    bloName: bloMapping[partNo].bloName,
                    partNo: partNo,
                    data: row
                });
            }
        });

        if (matchedRows.length === 0) {
            document.getElementById('loadingMsg').style.display = 'none';
            alert("पार्ट नंबर्स मॅच झाले नाहीत. फाईल तपासा.");
            return;
        }

        let groupedData = {};
        matchedRows.forEach(item => {
            if (!groupedData[item.supName]) { groupedData[item.supName] = []; }
            groupedData[item.supName].push(item);
        });

        let supervisorNames = Object.keys(groupedData).sort((a, b) => a.localeCompare(b));

        let grandTotals = Array(numericKeys.length).fill(0);
        let srNo = 1;
        let finalHtml = "";

        supervisorNames.forEach((sup, index) => {
            let supRows = groupedData[sup];
            let supTotals = Array(numericKeys.length).fill(0);
            
            // फक्त पहिल्या पेजला सोडून बाकी सर्व पेजेसच्या आधी 'page-break' लावणे
            if (index > 0) {
                finalHtml += `<div class="page-break"></div>`;
            }
            
            finalHtml += `
            <div class="print-header">
                <h3>BLO प्रगती अहवाल (AERO श्री अभिजीत देवगिरकर)</h3>
                <p>${reportDateStr}</p>
                <hr style="border: 1px solid #003366; margin-top: 10px; margin-bottom: 10px;">
            </div>`;
            
            finalHtml += `<table><thead><tr>`;
            headers.forEach(h => finalHtml += `<th>${h}</th>`);
            finalHtml += `</tr></thead><tbody>`;

            supRows.forEach((item, rowIndex) => {
                finalHtml += `<tr>`;
                finalHtml += `<td>${srNo++}</td>`;
                
                if (rowIndex === 0) {
                    finalHtml += `<td rowspan="${supRows.length}" style="vertical-align: middle; background-color: #fdfdfd;"><b>${item.supName}</b></td>`;
                }
                
                finalHtml += `<td>${item.bloName}</td>`;
                finalHtml += `<td>${item.partNo}</td>`;
                
                numericKeys.forEach((key, kIndex) => {
                    let val = parseInt(item.data[key]) || 0;
                    finalHtml += `<td>${val}</td>`;
                    supTotals[kIndex] += val;
                    grandTotals[kIndex] += val;
                });
                finalHtml += `</tr>`;
            });

            finalHtml += `<tr class="subtotal-row">`;
            finalHtml += `<td colspan="3" style="text-align:right;">${sup} (एकूण)</td>`;
            supTotals.forEach(val => finalHtml += `<td>${val}</td>`);
            finalHtml += `</tr>`;

            // शेवटच्या सुपरवायझरच्या खाली ग्रँड टोटल
            if (index === supervisorNames.length - 1) {
                finalHtml += `<tr class="grandtotal-row">`;
                finalHtml += `<td colspan="4" style="text-align:right;">सर्व सुपरवायझर (एकंदर बेरीज)</td>`;
                grandTotals.forEach(val => finalHtml += `<td>${val}</td>`);
                finalHtml += `</tr>`;
            }

            finalHtml += `</tbody></table>`;
        });

        pdfContainer.innerHTML = finalHtml;
        
        document.getElementById('loadingMsg').style.display = 'none';
        pdfContainer.style.display = 'block';
        document.getElementById('downloadPdfBtn').style.display = 'block';
    }

    // ५. नवीन आणि परिपूर्ण PDF डाऊनलोड पद्धत (Native Print)
    function downloadPDF() {
        // प्रिंट डायलॉग उघडेल, जिथे युझर थेट 'Save as PDF' निवडू शकतो.
        window.print();
    }
</script>
</body>
</html>
